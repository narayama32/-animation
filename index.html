<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>神アニメ114選統計</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #000; color: #fff; text-align: center; padding: 20px; font-family: sans-serif; }
        h1 { color: #8b0000; margin-bottom: 20px; }
        #container { width: 95%; max-width: 900px; margin: auto; background: #0a0a0a; padding: 15px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>ANIME SCORE TOP 114</h1>
    <div id="container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // ここがデータの心臓部です
        const labels = ["進撃の巨人", "シュタインズ・ゲート", "CLANNAD", "コードギアス", "まどか☆マギカ", "鋼の錬金術師", "エヴァンゲリオン", "ぼっち・ざ・ろっく！", "ガンダムSEED", "サイコパス"];
        const scores = [98, 97, 96, 95, 94, 93, 92, 91, 90, 89];

        // グラフを描画する命令
        const ctx = document.getElementById('myChart');
        if (ctx) {
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '10ソース合計スコア',
                        data: scores,
                        backgroundColor: '#8b0000', // 濃赤
                        borderColor: '#8b0000',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y', // 横棒にして見やすくする
                    scales: {
                        x: { grid: { color: '#222' }, ticks: { color: '#fff' } },
                        y: { ticks: { color: '#fff', font: { size: 11 } } }
                    },
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    }
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サンプルページ</title>
    <style>
        body {
            /* 背景は薄い青 */
            background-color: #e6f2ff; 
            /* 全文を「木賊色」に設定 */
            color: #3b7960; 
            margin: 20px;
            padding-top: 40px;
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
        }

        .container {
            background-color: #ffffff;
            /* 上側の余白を少し広めにとった設定 */
            padding: 40px 20px 20px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        h1, h2 {
            /* 見出しも同じ木賊色ですが、太字なので自然に目立ちます */
            color: #3b7960;
            margin-top: 20px;
        }

        /* 冒頭の名言に少しだけ装飾（任意） */
        .intro-text {
            border-bottom: 1px solid #3b7960;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: inline-block; /* 線の長さを文字に合わせる */
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="intro-text">愚者は経験に学び、賢者は歴史に学ぶ。</p>

        <h1>ここに大見出し（タイトル）</h1>
        
        <p>文豪の名言。</p>
        
        <p>
            アニメ作品の価値は？　worth of animation
        </p>

        <h2>予想は裏切っても、予期は裏切らない本。</h2>
        <p>読書猿の言語センスはすごい！</p>
    </div>

</body>
</html>
